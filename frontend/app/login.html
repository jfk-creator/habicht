<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style/main.css" />
    <link rel="stylesheet" href="style/login.css" />
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>
    <form id="loginForm" class="mainForm">
      <p>
        Du hast noch keinen Account? Du kannst dich
        <a href="./registration.html">hier</a> registrieren.
      </p>
      <input id="user" name="email" type="email" placeholder="E-Mail" />
      <input id="secret" name="secret" type="password" placeholder="Password" />
      <div class="alignRight">
        <button id="send" type="submit">Send</button>
      </div>
    </form>
    <script src="js/login.js"></script>
  </body>
</html>
